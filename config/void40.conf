# Void40 ZMK Configuration
# Controller: Raspberry Pi Pico (RP2040)

CONFIG_ZMK_KEYBOARD_NAME="Void40"

# USB HID
CONFIG_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Bluetooth (optional — Pi Pico doesn't have BT built-in, but config is harmless)
CONFIG_ZMK_BT=n

# Enable NKRO (N-key rollover)
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Layers
CONFIG_ZMK_KEYMAP_LAYERS_LEN=4
